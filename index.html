<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Content Security Policy (CSP) Rigorosa + Permissão do Supabase -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co;">

    <!-- Meta Tags Primárias -->
    <title>Novo Portal - A Redação Multimídia de Tupã e Região</title>
    <meta name="title" content="Novo Portal - A Redação Multimídia de Tupã e Região">

    <!-- Open Graph / Facebook / WhatsApp (Essencial para a aprovação na Meta) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://seusite.com.br/">
    <meta property="og:title" content="Novo Portal - A Redação Multimídia de Tupã e Região">

    <!-- Twitter / X -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://seusite.com.br/">
